<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengering Ikan Asin IoT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Sistem Pengeringan Ikan Asin</h1>
        <div class="date-display" id="dateDisplay">Memuat Tanggal...</div>
        <h3 id="jam-realtime" style="color: #555; font-weight: bold; text-align: center; margin-bottom: 20px;">00:00:00 WIB</h3>

        <div class="indicators">
            <div class="card">
                Suhu Ruang
                <span id="valSuhu">0 &deg;C</span>
            </div>
            <div class="card">
                Kelembaban
                <span id="valKelembaban">0 %</span>
            </div>
            <div class="card">
                Lama Oven Berjalan
                <span id="valTimer">00:00:00</span>
            </div>
            <div class="card">
                Penggunaan Gas
                <span id="valGas">0 Gram</span>
            </div>
            <div class="card">
                Bukaan Katup Gas
                <span id="valServo">0 &deg;</span>
                <div id="statusPanas" style="font-size: 16px; font-weight: normal; margin-top: 8px; color: #666;">Tertutup</div>
            </div>
        </div>
        <div class="card" style="grid-column: 1 / -1; margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">
                <h3 style="margin: 0; color: #333;">Riwayat Pengeringan (Otomatis per Menit)</h3>
                <button onclick="hapusRiwayat()" style="background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">🗑️ Hapus Riwayat</button>
            </div>
            
            <div style="overflow-x: auto; max-height: 300px;">
                <table style="width: 100%; border-collapse: collapse; text-align: center;">
                    <thead style="background-color: #3498db; color: white; position: sticky; top: 0;">
                        <tr>
                            <th style="padding: 10px; border: 1px solid #ddd;">Waktu</th>
                            <th style="padding: 10px; border: 1px solid #ddd;">Lama Nyala</th>
                            <th style="padding: 10px; border: 1px solid #ddd;">Suhu (°C)</th>
                            <th style="padding: 10px; border: 1px solid #ddd;">Kelembaban (%)</th>
                            <th style="padding: 10px; border: 1px solid #ddd;">Bukaan Gas</th>
                        </tr>
                    </thead>
                    <tbody id="tabelRiwayat">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="controls">
            <div class="form-group">
                <label for="pilihIkan">Mode Pengeringan (Pilih Jenis Ikan):</label>
                <select id="pilihIkan">
                    <option value="Ikan Bilis">Ikan Bilis</option>
                    <option value="Ikan Tamban">Ikan Tamban</option>
                    <option value="Sotong">Sotong</option>
                </select>
            </div>
            <button id="btnPower" class="btn" onclick="toggleSystem()">Mulai Proses (ON)</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
